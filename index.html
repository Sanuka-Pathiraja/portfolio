<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      html,
      body,
      #root {
        min-height: 100vh;
        margin: 0;
        background: #000;
      }

      body {
        color: #fff;
      }
    </style>
    <!-- Preconnect to external resources for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://api.github.com">
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Sanuka Pathiraja — Software Engineer</title>
    <meta name="description" content="F1-inspired portfolio of Sanuka Pathiraja — CS student, full-stack engineer, and algorithm designer." />
    
    <!-- Preload critical fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
    
    <!-- Resource hints for faster navigation -->
    <link rel="prefetch" href="/src/pages/Projects.jsx" />
    <link rel="prefetch" href="/src/pages/Contact.jsx" />

    <script>
      (function () {
        function paintError(message) {
          var panel = document.getElementById('startup-error-panel')
          if (!panel) {
            panel = document.createElement('pre')
            panel.id = 'startup-error-panel'
            panel.style.position = 'fixed'
            panel.style.left = '12px'
            panel.style.right = '12px'
            panel.style.bottom = '12px'
            panel.style.maxHeight = '40vh'
            panel.style.overflow = 'auto'
            panel.style.margin = '0'
            panel.style.padding = '12px 14px'
            panel.style.whiteSpace = 'pre-wrap'
            panel.style.background = '#130f12'
            panel.style.border = '1px solid rgba(255,255,255,0.15)'
            panel.style.borderRadius = '10px'
            panel.style.color = '#ffb3c1'
            panel.style.font = '12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace'
            panel.style.zIndex = '2147483647'
            document.addEventListener('DOMContentLoaded', function () {
              document.body.appendChild(panel)
            })
          }
          panel.textContent = String(message)
        }

        window.addEventListener('error', function (event) {
          paintError('Startup error: ' + (event.error?.stack || event.message || 'Unknown error'))
        })

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event.reason
          paintError('Unhandled rejection: ' + (reason?.stack || reason?.message || String(reason)))
        })
      })()
    </script>
  </head>
  <body>
    <div id="boot-status" style="position:fixed;top:12px;left:12px;right:12px;padding:10px 12px;border-radius:10px;border:1px solid rgba(103,232,249,0.22);background:rgba(7,15,20,0.96);color:#d7f8ff;font:12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;z-index:2147483646;">Initializing app...</div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
